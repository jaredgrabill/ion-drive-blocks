# CI for the official block registry (spec-05 §4 + spec-06): glob-discovered
# validation and `block test` (never a hardcoded block list — that's how
# `catalog` used to get skipped), the registry generator's --check as the
# drift/immutability guard, and a schemas-parity check against the core
# release the registry is built with.
name: ci

on:
  push: { branches: [main] }
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      # `ion-drive block test` creates a scratch database per block on this
      # Postgres and boots an ephemeral Ion Drive server against it.
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      # The CLI provides validate/build; core provides the strict Zod parsers.
      - run: npm install -g @ion-drive/cli@^0.4 @ion-drive/core@^0.4

      # Validate every block, discovered by glob — adding a block directory
      # automatically adds it to CI.
      - name: Validate every block
        run: |
          for manifest in */block.json; do
            dir=$(dirname "$manifest")
            echo "::group::$dir"
            ion-drive block validate "$dir"
            echo '::endgroup::'
          done

      # The real install-and-run loop (spec-06): per block, boot an ephemeral
      # server on a scratch database, install it (dependencies resolved
      # offline from this repo via --deps-from .), run the built-in assertion
      # suite + the block's own test/ files, and uninstall with zero residue.
      - name: Block test every block
        run: |
          for manifest in */block.json; do
            dir=$(dirname "$manifest")
            echo "::group::block test $dir"
            ion-drive block test "$dir" --deps-from . --json               --database-url postgresql://postgres:postgres@localhost:5432/postgres
            echo '::endgroup::'
          done

      # The drift + immutability guard: registry JSON and versioned artifacts
      # must match the sources exactly, and no released dist/<version>/ bytes
      # or version entries may change (the generator refuses).
      - name: Registry drift guard
        run: ion-drive registry build --check

      # /schemas/*.v1.json are copies of the JSON Schemas core generates from
      # its Zod definitions. They must match the core release CI installs.
      - name: Schemas parity with @ion-drive/core
        run: |
          core_schemas="$(npm root -g)/@ion-drive/core/schemas"
          if [ ! -d "$core_schemas" ]; then
            echo '::warning::installed @ion-drive/core ships no schemas/ — skipping parity check'
            exit 0
          fi
          diff -r schemas "$core_schemas"
