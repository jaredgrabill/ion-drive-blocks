name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      # The CLI provides validate/pack; core provides the authoritative Zod parser.
      - run: npm install -g @ionshift/ion-drive-cli @ionshift/ion-drive-core
      - name: Validate + pack every block
        run: |
          for dir in crm invoicing communications audit; do
            ion-drive block validate "$dir"
            ion-drive block pack "$dir"
          done
      - name: Artifact drift guard (dist/block.json must match sources)
        run: git diff --exit-code -- '*/dist/block.json'
