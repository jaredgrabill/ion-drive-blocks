# CI for the official block registry (spec-05 §4): glob-discovered validation
# (never a hardcoded block list — that's how `catalog` used to get skipped),
# the registry generator's --check as the drift/immutability guard, and a
# schemas-parity check against the core release the registry is built with.
name: ci

on:
  push: { branches: [main] }
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      # The CLI provides validate/build; core provides the strict Zod parsers.
      - run: npm install -g @ion-drive/cli@^0.3 @ion-drive/core@^0.3

      # Validate every block, discovered by glob — adding a block directory
      # automatically adds it to CI.
      - name: Validate every block
        run: |
          for manifest in */block.json; do
            dir=$(dirname "$manifest")
            echo "::group::$dir"
            ion-drive block validate "$dir"
            echo '::endgroup::'
          done

      # TODO(spec-06): add `ion-drive block test <dir>` per block once it exists.

      # The drift + immutability guard: registry JSON and versioned artifacts
      # must match the sources exactly, and no released dist/<version>/ bytes
      # or version entries may change (the generator refuses).
      - name: Registry drift guard
        run: ion-drive registry build --check

      # /schemas/*.v1.json are copies of the JSON Schemas core generates from
      # its Zod definitions. They must match the core release CI installs.
      - name: Schemas parity with @ion-drive/core
        run: |
          core_schemas="$(npm root -g)/@ion-drive/core/schemas"
          if [ ! -d "$core_schemas" ]; then
            echo '::warning::installed @ion-drive/core ships no schemas/ — skipping parity check'
            exit 0
          fi
          diff -r schemas "$core_schemas"
