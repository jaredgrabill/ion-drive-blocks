# Serves the repo root as the registry site (spec-05 §5, decision D2):
# registry JSON + versioned artifacts + attestation bundles + /schemas/* +
# registries.json, on GitHub Pages behind registry.iondrive.dev.
#
# GitHub Pages cannot set immutable cache headers on dist/** — accepted;
# digests make caching safe regardless. If that ever matters, migrate to
# Cloudflare Pages with a _headers file (see docs/registry-operations.md).
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
